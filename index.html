<!DOCTYPE html>
<html lang="en" data-theme="autumn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

</head>

<body class=" mt-5">
    <section class="w-11/12 mx-auto">
        <h1 class="text-3xl font-bold">Job Application Tracker</h1>

        <section class="mt-4">
            <div class="grid gap-5 lg:grid-cols-3 grid-cols-1">
                <div class="bg-white ps-5 py-5 rounded-lg">
                    <p class="text-2xl font-bold">Total</p>
                    <p id="total" class="font-bold text-2xl">8</p>
                </div>
                <div class="bg-white ps-5 py-5 rounded-lg">
                    <p class="text-2xl font-bold">Interview</p>
                    <p id="interview" class="text-green-500 font-bold text-2xl">0</p>
                </div>
                <div class="bg-white ps-5 py-5 rounded-lg">
                    <p class="text-2xl font-bold">Rejected</p>
                    <p id="rejected" class="text-red-500 font-bold text-2xl">0</p>
                </div>
            </div>

        </section>
    </section>

</body>

</html>
